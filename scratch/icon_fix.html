<!DOCTYPE html>
<html>
<head>
    <style>
        body { margin: 0; background: black; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        canvas { width: 1024px; height: 1024px; }
    </style>
</head>
<body>
    <canvas id="canvas" width="1024" height="1024"></canvas>
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const img = new Image();
        img.onload = () => {
            ctx.drawImage(img, 0, 0, 1024, 1024);
            document.title = "READY";
        };
        // We use a relative path that works via file:// if we open it from the project root
        img.src = "../src/assets/logo.png";
    </script>
</body>
</html>
